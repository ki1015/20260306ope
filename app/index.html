<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#1a365d" />
  <meta name="description" content="" />
  <meta property="og:title" content="" />
  <meta property="og:description" content="" />
  <title></title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- パスワードロック画面（解除までアプリを隠す） -->
  <div id="screen-lock" class="screen-lock">
    <div class="screen-lock-inner">
      <form id="lock-form" class="screen-lock-form">
        <input type="password" id="lock-password" class="screen-lock-input" placeholder="パスワード" autocomplete="current-password" />
        <button type="submit" class="btn btn-lock-submit">解除</button>
      </form>
      <p id="lock-error" class="screen-lock-error" aria-live="polite"></p>
    </div>
  </div>

  <div id="root">
    <!-- タイトル画面（メニュー） -->
    <section id="screen-title" class="screen screen-title active">
      <div class="title-content">
        <img src="img/title.png" alt="オペ戦マスターへの道" class="title-image" />
        <div class="title-menu">
          <div class="time-limit-setting">
            <p class="time-limit-label">回答時間</p>
            <div id="time-limit-options" class="time-limit-options"></div>
          </div>
          <button type="button" id="btn-full-challenge" class="btn btn-menu">全問チャレンジ</button>
          <button type="button" id="btn-all" class="btn btn-menu">ランダム10問</button>
          <button type="button" id="btn-wrong-only" class="btn btn-menu" style="display:none;">間違えた問題だけ復習（0 問）</button>
          <div class="category-select-block">
            <p class="instruction">カテゴリー（タップでスタート）</p>
            <div id="category-list" class="category-list category-toggle"></div>
          </div>
          <div id="stats-area" class="stats-area title-stats" style="display:none;">
            <p class="stats-heading">生涯成績</p>
            <p class="stats-line"></p>
          </div>
          <button type="button" id="btn-reset-stats" class="btn btn-reset">リセット</button>
        </div>
      </div>
    </section>

    <!-- 問題画面（タイトルから直接遷移） -->
    <section id="screen-quiz" class="screen">
      <header class="header compact">
        <button type="button" id="btn-back-quiz" class="header-back">最初に戻る</button>
        <span id="quiz-mode-label" class="header-mode-label" aria-hidden="true"></span>
        <span id="progress-text" class="progress">1 / 10</span>
        <span id="timer-display" class="timer-display" aria-live="polite"></span>
        <span id="score-text" class="score"></span>
      </header>
      <div id="timer-bar-wrap" class="timer-bar-wrap" aria-hidden="true">
        <div id="timer-bar" class="timer-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
      </div>
      <div class="content">
        <div id="question-card" class="card question-card">
          <p id="question-text" class="question-text"></p>
          <div id="choices" class="choices"></div>
        </div>
      </div>
    </section>

    <!-- 正誤・解説画面 -->
    <section id="screen-result" class="screen">
      <header class="header compact">
        <button type="button" id="btn-back-result" class="header-back">最初に戻る</button>
        <span id="result-mode-label" class="header-mode-label" aria-hidden="true"></span>
        <span id="result-progress-text" class="progress"></span>
        <span id="result-score-text" class="score"></span>
        <span id="result-label" class="result-label" aria-hidden="true"></span>
      </header>
      <div class="content">
        <div id="result-badge" class="result-badge" aria-hidden="true"></div>
        <div id="explanation-card" class="card explanation-card">
          <p id="explanation-text" class="explanation-text"></p>
          <button type="button" id="btn-next" class="btn btn-primary">次へ</button>
        </div>
      </div>
    </section>

    <!-- 結果サマリ画面 -->
    <section id="screen-summary" class="screen">
      <header class="header">
        <h2>結果</h2>
      </header>
      <div class="content">
        <div id="summary-card" class="card summary-card">
          <p id="summary-text" class="summary-text"></p>
          <div id="summary-stats" class="summary-stats"></div>
          <button type="button" id="btn-retry-session-wrong" class="btn btn-secondary" style="display:none;">今回間違えた問題だけもう一度</button>
          <button type="button" id="btn-review-wrong" class="btn btn-secondary" style="display:none;">間違えた問題を復習</button>
          <button type="button" id="btn-retry" class="btn btn-primary">最初に戻る</button>
        </div>
      </div>
    </section>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
